<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>404 — agents-101</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --amber:#FBAF32; --blue:#4992C1; --navy:#11172C; --sky:#1A9ED7;
  --light:#F5F8FB; --paper:#FFFFFF; --ink:#11172C;
  --shadow-sm:0 4px 12px rgba(17,23,44,.10);
  --shadow-md:0 8px 24px rgba(17,23,44,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Work Sans',sans-serif; color:var(--ink);
  background:var(--light);
  background-image:radial-gradient(rgba(73,146,193,.07) 1px,transparent 1.4px);
  background-size:28px 28px;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; padding:2rem;
}
.kicker{
  display:inline-block; font-family:'Caveat',cursive; font-weight:700;
  font-size:clamp(1rem,2.2vw,1.3rem); color:var(--navy);
  background:var(--amber); border:2px solid var(--navy);
  padding:.18em 1em; border-radius:999px; box-shadow:var(--shadow-sm);
  margin-bottom:1.2rem;
}
.code{
  font-family:'Fraunces',serif; font-weight:700; color:var(--sky);
  font-size:clamp(4rem,18vw,9rem); line-height:1; letter-spacing:-.02em;
}
h1{
  font-family:'Fraunces',serif; font-weight:700; letter-spacing:-.01em;
  font-size:clamp(1.6rem,5vw,2.8rem); margin:.3rem 0 .6rem;
}
p.lead{
  font-size:clamp(.95rem,2vw,1.15rem); line-height:1.55;
  color:rgba(17,23,44,.7); max-width:460px; margin:0 auto 1.6rem;
}
.btn-row{display:flex; flex-wrap:wrap; gap:.8rem; justify-content:center;}
.btn{
  font-family:'Caveat',cursive; font-weight:700; font-size:clamp(1rem,2vw,1.2rem);
  text-decoration:none; border:2px solid var(--navy); border-radius:999px;
  padding:.35em 1.3em; box-shadow:var(--shadow-sm);
  transition:transform .12s ease, box-shadow .12s ease;
}
.btn.primary{ background:var(--amber); color:var(--navy); }
.btn.secondary{ background:var(--paper); color:var(--ink); }
.btn:hover{ transform:translate(-1px,-1px); box-shadow:var(--shadow-md); }
</style>
</head>
<body>
  <span class="kicker">page not found</span>
  <div class="code">404</div>
  <h1>This slide doesn't exist.</h1>
  <p class="lead">The deck you're looking for wandered off. Let's get you back on track.</p>
  <div class="btn-row">
    <a class="btn primary" href="/agents-101/">← Back home</a>
    <a class="btn secondary" href="/agents-101/seasons/">Browse seasons</a>
  </div>
</body>
</html>
